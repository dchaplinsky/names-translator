name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "pypy-3.10"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: pip install -e .[dev]

      - name: Install the DAWG builder (CPython only, for compiler tests)
        if: ${{ !startsWith(matrix.python-version, 'pypy') }}
        run: pip install -e ".[fast]"

      - name: Import smoke test (no SyntaxWarning)
        run: python -W error::SyntaxWarning -c "import names_translator, names_translator.name_utils"

      - name: Run tests
        run: pytest -v

      - name: Dicts package integration (inter-package discovery seam)
        if: ${{ hashFiles('dicts-dist/names_translator_dicts_uk/data/manifest.json') != '' }}
        run: |
          pip install ./dicts-dist
          python -c "from names_translator.dicts import NameDicts; d = NameDicts(); assert d.available; r = d.lookup('Дмитро', 'first'); assert r and r[0] == 'Дмитрий', r"
          pip uninstall -y names-translator-dicts-uk

name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Smoke-test the built wheel (all pools present)
        run: |
          pip install dist/*.whl
          python -I -c "from names_translator.dicts import POOLS, NameDicts; d = NameDicts(); assert all(d.as_dict(p) for p in POOLS), 'empty pool'; assert d.lookup('Дмитро', 'first')[0] == 'Дмитрий'"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/names_translator
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
